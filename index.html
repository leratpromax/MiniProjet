<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accueil – WIDOX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <!-- Pré-connexion à Google Fonts pour charger plus vite -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="CSSévent.css">
</head>

<body>

<nav>
  <span class="logo-text">WIDOX</span>

  <div class="nav-links" id="nav-links">
    <a href="index.html" class="active">Accueil</a>
    <a href="page2.html">Duels</a>
    <a href="page3.html">Classement</a>
  </div>

  <button class="nav-hamburger" id="nav-hamburger" onclick="toggleNav()" aria-label="Menu">
    <!-- Bouton qui ressemble à un hamburger pour mobile (3 barres) -->
    <span></span><span></span><span></span>
    <!-- Les 3 traits du menu -->
  </button>
</nav>

<main>
  <div class="hero-label yellow">Gestionnaire de tournoi</div>
  <!-- Étiquette jaune décorative en haut -->

  <h1>Lance ton <span class="accent">Événement</span></h1>
  <!-- Titre principal, "Événement" coloré en accent -->

  <div id="event-badge">
    <!-- Bandeau qui affiche l'événement une fois créé -->
    <div class="ev-icon">🏆</div>
    <!-- Icône trophée -->
    <div>
      <div class="ev-name" id="ev-name-display"></div>
      <!-- Nom de l'événement -->
      <div class="ev-desc" id="ev-desc-display"></div>
      <!-- Description de l'événement -->
    </div>
  </div>

  <div class="card">
    <div class="card-title">Créer l'événement</div>
    <!-- Titre de la carte -->

    <div class="form-row">
      <input type="text" id="nomEvent" placeholder="Nom de l'événement">
    </div>

    <textarea id="descEvent" placeholder="Description de l'événement"></textarea>
    <button class="btn" onclick="creerEvent()">Créer l'événement</button>
    <!-- Bouton qui appelle la fonction creerEvent() -->
  </div>


  <div class="card">
    <div class="card-title">
      Participants
      <span class="count-badge" id="count-badge">0</span>
    </div>

    <div class="form-row">
      <input type="text" id="prenom" placeholder="Prénom">
      <input type="text" id="nom" placeholder="Nom">
    </div>

    <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
      <!-- Conteneur flex pour les boutons côte à côte -->
      <button class="btn" onclick="ajouterParticipant()">+ Ajouter</button>
      <!-- Bouton pour ajouter un participant -->
      <button class="btn btn-muted" onclick="viderListe()">Vider la liste</button>
      <!-- Bouton grisé pour tout vider -->
    </div>

    <ul id="listeParticipants">
      <!-- Liste dynamique des participants -->
      <li class="empty-state"><span>👥</span>Aucun participant pour l'instant.</li>
      <!-- Message par défaut quand la liste est vide -->
    </ul>
  </div>

  <div class="bottom-actions">
    <a href="page2.html" class="nav-btn">⚔️ Configurer les duels →</a>
    <!-- Lien-bouton vers la page des duels -->
    <button class="btn btn-reset" onclick="resetTout()">🗑️ Tout réinitialiser</button>
    <!-- Bouton rouge pour supprimer toutes les données -->
  </div>

</main>

<div class="toast" id="toast"></div>
<!-- Petite barre de notification temporaire en bas -->

<script>
  // RÉINITIALISATION TOTALE
  function resetTout() {
    // Demande confirmation à l'utilisateur
    if (confirm('⚠️ Supprimer TOUTES les données (événement, participants, scores) ?')) {
      localStorage.removeItem('widox_participants');
      localStorage.removeItem('widox_event');
      localStorage.removeItem('widox_duels');
      localStorage.removeItem('widox_scores');
      location.reload();
    }
  }

  //CHARGEMENT DES DONNÉES SAUVEGARDÉES

  let participants = JSON.parse(localStorage.getItem('widox_participants') || '[]');
  // Récupère la liste des participants depuis le stockage local

  let event = JSON.parse(localStorage.getItem('widox_event') || 'null');
  // Récupère l'événement depuis le stockage local

  // MENU HAMBURGER MOBILE
  function toggleNav() {
    document.getElementById('nav-links').classList.toggle('open');
    // Ouvre ou ferme le menu mobile en ajoutant/retirant la classe "open"
  }

  // SAUVEGARDE DANS LE STOCKAGE LOCAL
  function save() {
    localStorage.setItem('widox_participants', JSON.stringify(participants));
    // Convertit le tableau participants en texte JSON et le sauvegarde
  }

  // AFFICHAGE D'UNE NOTIFICATION TOAST
  function showToast(msg) {
    const t = document.getElementById('toast');
    // Récupère l'élément toast
    t.textContent = msg;
    // Met le message dedans
    t.classList.add('show');
    // L'affiche avec une animation
    setTimeout(() => t.classList.remove('show'), 2500);
    // Le masque après 2,5 secondes
  }

  // === CRÉATION D'UN ÉVÉNEMENT ===
  function creerEvent() {
    const nom = document.getElementById('nomEvent').value.trim();
    // Récupère le nom saisi
    const desc = document.getElementById('descEvent').value.trim();
    // Récupère la description saisie
    if (!nom) { alert('Donne un nom à l\'événement !'); return; }
    // Bloque si le nom est vide

    event = { nom, desc };
    // Crée un objet événement avec nom et description
    localStorage.setItem('widox_event', JSON.stringify(event));
    // Sauvegarde l'événement dans le stockage

    participants = participants.map(p => ({ ...p, wins: 0, losses: 0 }));
    // Remet les victoires et défaites de chaque participant à zéro
    save();
    // Sauvegarde les participants mis à jour

    afficherEvent();
    // Met à jour l'affichage du badge événement
    showToast('🏆 Événement créé !');
    // Affiche une notification de succès
  }

  // === AFFICHAGE DU BADGE ÉVÉNEMENT ===
  function afficherEvent() {
    const badge = document.getElementById('event-badge');
    // Récupère le conteneur du badge
    if (event) {
      // Si un événement existe
      document.getElementById('ev-name-display').textContent = event.nom;
      // Affiche le nom
      document.getElementById('ev-desc-display').textContent = event.desc || 'Aucune description';
      // Affiche la description
      badge.classList.add('visible');
      // Rend le badge visible
      document.getElementById('nomEvent').value = event.nom;
      // Pré-remplit le champ nom
      document.getElementById('descEvent').value = event.desc || '';
      // Pré-remplit le champ description
    }
  }

  // AJOUT D'UN PARTICIPANT
  function ajouterParticipant() {
    const nom = document.getElementById('nom').value.trim();
    // Récupère le nom saisi
    const prenom = document.getElementById('prenom').value.trim();
    // Récupère le prénom saisi
    if (!nom || !prenom) { alert('Remplis prénom et nom !'); return; }
    // Bloque si un champ est vide

    const existe = participants.find(p => p.nom === nom && p.prenom === prenom);
    // Vérifie si ce participant existe déjà
    if (existe) { alert('Ce participant existe déjà !'); return; }
    // Bloque les doublons

    participants.push({ prenom, nom, wins: 0, losses: 0 });
    // Ajoute le nouveau participant avec 0 victoires et 0 défaites
    save();
    // Sauvegarde la liste mise à jour

    document.getElementById('nom').value = '';
    // Vide le champ nom
    document.getElementById('prenom').value = '';
    // Vide le champ prénom

    afficherParticipants();
    // Met à jour l'affichage de la liste
    showToast(`✅ ${prenom} ${nom} ajouté !`);
    // Notification de confirmation
  }

  // SUPPRESSION D'UN PARTICIPANT
  function supprimerParticipant(index) {
    const p = participants[index];
    // Récupère le participant à cet index
    if (confirm(`Supprimer ${p.prenom} ${p.nom} ?`)) {
      // Demande confirmation
      participants.splice(index, 1);
      // Retire le participant du tableau
      save();
      // Sauvegarde
      afficherParticipants();
      // Met à jour l'affichage
    }
  }

  // === VIDER TOUTE LA LISTE ===
  function viderListe() {
    if (!participants.length) return;
    // Ne fait rien si la liste est déjà vide
    if (confirm('Vider toute la liste de participants ?')) {
      // Demande confirmation
      participants = [];
      // Vide le tableau
      save();
      // Sauvegarde
      afficherParticipants();
      // Met à jour l'affichage
    }
  }

  // AFFICHAGE DE LA LISTE DES PARTICIPANTS
  function afficherParticipants() {
    const liste = document.getElementById('listeParticipants');
    // Récupère la balise <ul>
    document.getElementById('count-badge').textContent = participants.length;
    // Met à jour le compteur dans la pastille

    if (participants.length === 0) {
      // Si aucun participant
      liste.innerHTML = '<li class="empty-state"><span>👥</span>Aucun participant pour l\'instant.</li>';
      // Affiche le message vide
      return;
      // Arrête la fonction ici
    }

    liste.innerHTML = participants.map((p, i) => `
      <li>
        <span class="participant-num">${i + 1}</span>
        <!-- Numéro du participant (commence à 1) -->
        <span class="participant-name">${p.prenom} ${p.nom}</span>
        <!-- Prénom et nom -->
        <span class="participant-wins">⚔ ${p.wins}V / ${p.losses}D</span>
        <!-- Score : victoires (V) et défaites (D) -->
        <button class="btn btn-danger" onclick="supprimerParticipant(${i})">✕</button>
        <!-- Bouton rouge pour supprimer ce participant -->
      </li>
    `).join('');
    // Génère le HTML pour chaque participant et l'insère dans la liste
  }

  afficherEvent();
  afficherParticipants();

  // RACCOURCIS CLAVIER

  document.getElementById('prenom').addEventListener('keypress', e => { if(e.key==='Enter') document.getElementById('nom').focus(); });
  // Quand on appuie Entrée dans le champ prénom → passe au champ nom

  document.getElementById('nom').addEventListener('keypress', e => { if(e.key==='Enter') ajouterParticipant(); });
  // Quand on appuie Entrée dans le champ nom → ajoute le participant

</script>
</body>
</html>
